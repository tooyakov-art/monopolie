<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>МОНОПОЛИЕ Mini</title>
<link rel="manifest" href="manifest.json">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif;
    background: #0a0a0f;
    color: white;
    min-height: 100vh;
    padding: 16px;
    -webkit-font-smoothing: antialiased;
  }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .logo { display: flex; align-items: center; gap: 8px; }
  .logo-icon { width: 28px; height: 28px; border-radius: 8px; background: linear-gradient(135deg, #00d4ff, #a855f7); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; }
  .logo-text { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; display: inline-block; margin-right: 4px; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .live-text { font-size: 11px; color: #10b981; font-weight: 500; }
  .total-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; padding: 20px; margin-bottom: 12px; position: relative; overflow: hidden; }
  .total-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 30% 30%, rgba(0,212,255,0.06), transparent 60%); }
  .total-label { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 4px; position: relative; }
  .total-amount { font-size: 36px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, #00d4ff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; position: relative; line-height: 1.1; }
  .total-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; position: relative; }
  .total-change { font-size: 12px; color: #10b981; font-weight: 600; position: absolute; top: 20px; right: 20px; }
  .today-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .today-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 12px; }
  .today-label { font-size: 10px; color: rgba(255,255,255,0.35); margin-bottom: 2px; }
  .today-value { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .today-sub { font-size: 10px; color: #10b981; margin-top: 1px; }
  .niches { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .niches-title { font-size: 12px; font-weight: 600; margin-bottom: 12px; color: rgba(255,255,255,0.6); }
  .niche-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .niche-row:last-child { margin-bottom: 0; }
  .niche-icon { font-size: 14px; width: 20px; text-align: center; }
  .niche-name { font-size: 11px; color: rgba(255,255,255,0.5); width: 70px; flex-shrink: 0; }
  .niche-bar-bg { flex: 1; height: 8px; background: rgba(255,255,255,0.04); border-radius: 4px; overflow: hidden; }
  .niche-bar { height: 100%; border-radius: 4px; transition: width 1s ease; }
  .niche-amount { font-size: 11px; font-weight: 600; width: 50px; text-align: right; }
  .goal { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
  .goal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .goal-title { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); }
  .goal-numbers { font-size: 11px; color: rgba(255,255,255,0.35); }
  .goal-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.04); border-radius: 3px; overflow: hidden; }
  .goal-bar { height: 100%; border-radius: 3px; background: linear-gradient(90deg, #00d4ff, #a855f7, #ec4899); background-size: 200% 100%; animation: shift 3s ease infinite; }
  @keyframes shift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  .content-today { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 16px; }
  .content-title { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); margin-bottom: 10px; }
  .content-dots { display: flex; gap: 6px; flex-wrap: wrap; }
  .content-dot { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .dot-done { background: rgba(16,185,129,0.15); border: 1px solid rgba(16,185,129,0.3); }
  .dot-progress { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); animation: pulse 2s infinite; }
  .dot-pending { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">M</div>
    <span class="logo-text">МОНОПОЛИЕ</span>
  </div>
  <div style="display:flex;align-items:center;gap:4px">
    <span class="live-dot"></span>
    <span class="live-text" id="live-time">Live</span>
  </div>
</div>

<div class="total-card">
  <div class="total-label" id="total-label">Загрузка...</div>
  <div class="total-amount" id="total-amount">—</div>
  <div class="total-sub" id="total-sub"></div>
  <div class="total-change" id="total-change"></div>
</div>

<div class="today-row">
  <div class="today-card">
    <div class="today-label">Сегодня</div>
    <div class="today-value" id="today-value">—</div>
    <div class="today-sub" id="today-sub"></div>
  </div>
  <div class="today-card">
    <div class="today-label">Новые подписчики</div>
    <div class="today-value" id="subs-new">—</div>
    <div class="today-sub" id="subs-total"></div>
  </div>
</div>

<div class="niches">
  <div class="niches-title">Доход по нишам</div>
  <div id="niches-list"></div>
</div>

<div class="goal">
  <div class="goal-header">
    <span class="goal-title" id="goal-title">Цель</span>
    <span class="goal-numbers" id="goal-numbers"></span>
  </div>
  <div class="goal-bar-bg">
    <div class="goal-bar" id="goal-bar" style="width:0%"></div>
  </div>
</div>

<div class="content-today">
  <div class="content-title" id="content-title">Контент сегодня</div>
  <div class="content-dots" id="content-dots"></div>
</div>

<script>
const API = './api/data.json';

function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(n%1000000===0?0:2).replace(/\.?0+$/,'') + 'M';
  if (n >= 1000) return (n/1000).toFixed(n%1000===0?0:1).replace(/\.?0+$/,'') + 'K';
  return n;
}

async function load() {
  try {
    const r = await fetch(API + '?t=' + Date.now());
    const d = await r.json();
    render(d);
  } catch(e) {
    document.getElementById('total-label').textContent = '⚠ Нет связи';
  }
}

function render(d) {
  // Updated time
  const t = new Date(d.updated);
  document.getElementById('live-time').textContent = t.getHours() + ':' + String(t.getMinutes()).padStart(2,'0');

  // Total
  document.getElementById('total-label').textContent = 'Доход · ' + d.month;
  document.getElementById('total-amount').textContent = fmt(d.total.amount) + ' ₸';
  document.getElementById('total-sub').textContent = '≈ $' + d.total.usd.toLocaleString();
  document.getElementById('total-change').textContent = '↑ ' + d.total.change + '%';

  // Today
  document.getElementById('today-value').textContent = fmt(d.today.amount) + ' ₸';
  document.getElementById('today-sub').textContent = '↑ ' + d.today.change + '% vs вчера';

  // Subscribers
  document.getElementById('subs-new').textContent = '+' + d.subscribers.new;
  document.getElementById('subs-total').textContent = fmt(d.subscribers.total) + ' всего';

  // Niches
  const maxAmt = Math.max(...d.niches.map(n => n.amount));
  const list = document.getElementById('niches-list');
  list.innerHTML = d.niches.map(n => `
    <div class="niche-row">
      <span class="niche-icon">${n.icon}</span>
      <span class="niche-name">${n.name}</span>
      <div class="niche-bar-bg"><div class="niche-bar" style="width:${(n.amount/maxAmt*100).toFixed(0)}%;background:${n.color}"></div></div>
      <span class="niche-amount" style="color:${n.color}">${n.display}</span>
    </div>
  `).join('');

  // Goal
  const pct = (d.goal.current / d.goal.target * 100).toFixed(1);
  document.getElementById('goal-title').textContent = 'Цель: ' + fmt(d.goal.target) + ' ₸/мес';
  document.getElementById('goal-numbers').textContent = fmt(d.goal.current) + ' / ' + fmt(d.goal.target);
  document.getElementById('goal-bar').style.width = pct + '%';

  // Content
  const c = d.content;
  document.getElementById('content-title').textContent = 'Контент сегодня: ' + c.done + ' / ' + c.total;
  let dots = '';
  for (let i = 0; i < c.total; i++) {
    if (i < c.done) dots += '<div class="content-dot dot-done">✓</div>';
    else if (i === c.done) dots += '<div class="content-dot dot-progress">◉</div>';
    else dots += '<div class="content-dot dot-pending"></div>';
  }
  document.getElementById('content-dots').innerHTML = dots;
}

// Загрузка + автообновление каждые 5 минут
load();
setInterval(load, 5 * 60 * 1000);
</script>

</body>
</html>
