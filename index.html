<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>МОНОПОЛИЕ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; -webkit-tap-highlight-color: transparent; }

  .container { max-width: 480px; margin: 0 auto; padding: 16px; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, #00d4ff, #a855f7); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; }
  .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* Total card */
  .total-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 24px; margin-bottom: 20px; }
  .total-label { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
  .total-amount { font-size: 48px; font-weight: 900; background: linear-gradient(135deg, #00d4ff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; }
  .total-sub { font-size: 12px; color: rgba(255,255,255,0.25); margin-top: 4px; }

  /* Projects */
  .section-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: rgba(255,255,255,0.6); }

  .project-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: transform 0.2s, background 0.2s;
    cursor: pointer;
  }
  .project-card:active { transform: scale(0.98); background: rgba(255,255,255,0.06); }

  .project-icon {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .project-info { flex: 1; min-width: 0; }
  .project-name { font-size: 15px; font-weight: 700; }
  .project-desc { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 2px; }
  .project-right { text-align: right; flex-shrink: 0; }
  .project-amount { font-size: 16px; font-weight: 700; }
  .project-status {
    font-size: 10px; padding: 3px 8px; border-radius: 6px;
    font-weight: 600; display: inline-block; margin-top: 4px;
  }

  .status-active { background: rgba(16,185,129,0.15); color: #10b981; }
  .status-dev { background: rgba(0,212,255,0.15); color: #00d4ff; }
  .status-deadline { background: rgba(239,68,68,0.2); color: #ef4444; }
  .status-paused { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); }

  /* Income chart */
  .chart-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 16px;
    margin-top: 20px;
  }
  .chart-card canvas { width: 100% !important; height: 160px !important; }

  /* Deadline banner */
  .deadline-banner {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .deadline-banner .days { font-weight: 800; color: #ef4444; font-size: 22px; }
  .deadline-banner .text { color: rgba(255,255,255,0.6); }
  .deadline-banner .text strong { color: #fff; }

  /* Updated timestamp */
  .updated { text-align: center; font-size: 11px; color: rgba(255,255,255,0.15); margin-top: 24px; padding-bottom: 24px; }

  /* PIN screen */
  .pin-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: #0a0a0f;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 24px;
  }
  .pin-screen.hidden { display: none; }
  .pin-logo { width: 72px; height: 72px; border-radius: 20px; background: linear-gradient(135deg, #00d4ff, #a855f7); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 32px; }
  .pin-dots { display: flex; gap: 12px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); transition: all 0.2s; }
  .pin-dot.filled { background: #00d4ff; border-color: #00d4ff; }
  .pin-dot.error { background: #ef4444; border-color: #ef4444; animation: shake 0.4s; }
  .pin-pad { display: grid; grid-template-columns: repeat(3, 72px); gap: 12px; }
  .pin-btn {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    color: #fff; font-size: 28px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .pin-btn:active { background: rgba(255,255,255,0.15); transform: scale(0.95); }
  .pin-btn.empty { visibility: hidden; }
  .pin-btn.del { font-size: 18px; }
  @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
</style>
</head>
<body>

<!-- PIN Screen -->
<div class="pin-screen" id="pinScreen">
  <div class="pin-logo">M</div>
  <div class="pin-dots" id="pinDots">
    <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
  </div>
  <div class="pin-pad">
    <div class="pin-btn" onclick="pinPress(1)">1</div>
    <div class="pin-btn" onclick="pinPress(2)">2</div>
    <div class="pin-btn" onclick="pinPress(3)">3</div>
    <div class="pin-btn" onclick="pinPress(4)">4</div>
    <div class="pin-btn" onclick="pinPress(5)">5</div>
    <div class="pin-btn" onclick="pinPress(6)">6</div>
    <div class="pin-btn" onclick="pinPress(7)">7</div>
    <div class="pin-btn" onclick="pinPress(8)">8</div>
    <div class="pin-btn" onclick="pinPress(9)">9</div>
    <div class="pin-btn empty"></div>
    <div class="pin-btn" onclick="pinPress(0)">0</div>
    <div class="pin-btn del" onclick="pinDel()">⌫</div>
  </div>
</div>

<script>
const PIN_HASH = '7982';
let pinInput = '';

function pinPress(n) {
  if (pinInput.length >= 4) return;
  pinInput += n;
  updateDots();
  if (pinInput.length === 4) {
    if (pinInput === PIN_HASH) {
      sessionStorage.setItem('m_auth', '1');
      document.getElementById('pinScreen').classList.add('hidden');
    } else {
      document.querySelectorAll('.pin-dot').forEach(d => d.classList.add('error'));
      setTimeout(() => {
        pinInput = '';
        updateDots();
        document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('error'));
      }, 500);
    }
  }
}

function pinDel() {
  pinInput = pinInput.slice(0, -1);
  updateDots();
}

function updateDots() {
  document.querySelectorAll('.pin-dot').forEach((d, i) => {
    d.classList.toggle('filled', i < pinInput.length);
  });
}

if (sessionStorage.getItem('m_auth') === '1') {
  document.getElementById('pinScreen').classList.add('hidden');
}
</script>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">M</div>
      <h1>МОНОПОЛИЕ</h1>
    </div>
    <div class="live-dot"></div>
  </div>

  <!-- Deadline banner -->
  <div class="deadline-banner" id="deadlineBanner" style="display:none">
    <div class="days" id="deadlineDays">—</div>
    <div class="text"><strong id="deadlineName">—</strong><br><span id="deadlineText">—</span></div>
  </div>

  <!-- Total income -->
  <div class="total-card">
    <div class="total-label" id="totalLabel">Доход за март 2026</div>
    <div class="total-amount" id="totalAmount">0 ₸</div>
    <div class="total-sub" id="totalSub">Старт с нуля</div>
  </div>

  <!-- Projects -->
  <div class="section-title">Проекты</div>
  <div id="projectsList"></div>

  <!-- Chart -->
  <div class="chart-card">
    <div class="section-title" style="margin-bottom:8px">Доход по месяцам</div>
    <canvas id="revenueChart"></canvas>
  </div>

  <div class="updated" id="updatedTime">—</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
const API = './api/data.json';
let chartInstance = null;

const STATUS_MAP = {
  active: { label: 'Активен', class: 'status-active' },
  dev: { label: 'В разработке', class: 'status-dev' },
  deadline: { label: 'Дедлайн', class: 'status-deadline' },
  paused: { label: 'Пауза', class: 'status-paused' }
};

function fmt(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, '') + 'K';
  return String(n);
}

function daysLeft(dateStr) {
  const now = new Date();
  const target = new Date(dateStr);
  const diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
  return diff;
}

function pluralDays(n) {
  if (n <= 0) return 'Просрочено!';
  const abs = Math.abs(n);
  const last = abs % 10;
  const tens = abs % 100;
  if (last === 1 && tens !== 11) return abs + ' день';
  if (last >= 2 && last <= 4 && (tens < 12 || tens > 14)) return abs + ' дня';
  return abs + ' дней';
}

async function load() {
  try {
    const r = await fetch(API + '?t=' + Date.now());
    const d = await r.json();
    render(d);
  } catch (e) {
    document.getElementById('totalLabel').textContent = 'Нет связи';
  }
}

function render(d) {
  // Total
  document.getElementById('totalLabel').textContent = 'Доход за ' + d.month.toLowerCase();
  document.getElementById('totalAmount').textContent = d.total.amount > 0 ? fmt(d.total.amount) + ' ₸' : '0 ₸';

  if (d.total.amount > 0 && d.total.usd > 0) {
    document.getElementById('totalSub').textContent = '≈ $' + d.total.usd;
  } else {
    document.getElementById('totalSub').textContent = 'Старт с нуля';
  }

  // Deadline banner
  const deadlineProject = d.projects.find(p => p.deadline);
  if (deadlineProject) {
    const days = daysLeft(deadlineProject.deadline);
    const banner = document.getElementById('deadlineBanner');
    banner.style.display = 'flex';
    document.getElementById('deadlineDays').textContent = days <= 0 ? '!' : days;
    document.getElementById('deadlineName').textContent = deadlineProject.name;
    document.getElementById('deadlineText').textContent = days <= 0 ? 'Дедлайн прошёл!' : pluralDays(days) + ' до дедлайна';
  }

  // Projects
  const list = document.getElementById('projectsList');
  list.innerHTML = d.projects.map(p => {
    const status = STATUS_MAP[p.status] || STATUS_MAP.active;
    return `
    <div class="project-card">
      <div class="project-icon" style="background:${p.color}15">
        ${p.icon}
      </div>
      <div class="project-info">
        <div class="project-name">${p.name}</div>
        <div class="project-desc">${p.desc}</div>
      </div>
      <div class="project-right">
        <div class="project-amount" style="color:${p.color}">${p.amount > 0 ? fmt(p.amount) + ' ₸' : '0 ₸'}</div>
        <span class="project-status ${status.class}">${status.label}</span>
      </div>
    </div>`;
  }).join('');

  // Chart
  renderChart(d.months);

  // Updated
  const upd = new Date(d.updated);
  document.getElementById('updatedTime').textContent = 'Обновлено ' + upd.toLocaleString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
}

function renderChart(months) {
  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('revenueChart').getContext('2d');

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months.map(m => m.month),
      datasets: [{
        data: months.map(m => m.amount),
        backgroundColor: months.map((_, i) => i === months.length - 1 ? '#00d4ff' : 'rgba(0,212,255,0.3)'),
        borderRadius: 8,
        barThickness: months.length === 1 ? 60 : undefined
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: {
          grid: { display: false },
          ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 11 } }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.04)' },
          ticks: {
            color: 'rgba(255,255,255,0.3)',
            font: { size: 11 },
            callback: v => v >= 1000 ? fmt(v) : v
          },
          beginAtZero: true
        }
      }
    }
  });
}

load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
