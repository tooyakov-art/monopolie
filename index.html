<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<title>МОНОПОЛИЕ</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #fff; font-family: 'Inter', sans-serif; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
  .container { max-width: 480px; margin: 0 auto; padding: 16px; padding-bottom: 40px; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #00d4ff, #a855f7); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 16px; }
  .header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .header-right { font-size: 11px; color: rgba(255,255,255,0.25); text-align: right; }

  /* Focus card — THE ONE THING */
  .focus-card {
    background: linear-gradient(135deg, rgba(239,68,68,0.08), rgba(245,158,11,0.08));
    border: 1px solid rgba(239,68,68,0.2);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .focus-card::before {
    content: '';
    position: absolute; top: 0; left: 0; width: 4px; height: 100%;
    background: linear-gradient(180deg, #ef4444, #f59e0b);
    border-radius: 4px 0 0 4px;
  }
  .focus-label { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: #ef4444; font-weight: 700; margin-bottom: 8px; }
  .focus-question { font-size: 14px; color: rgba(255,255,255,0.5); margin-bottom: 6px; font-style: italic; }
  .focus-answer { font-size: 18px; font-weight: 800; line-height: 1.3; }
  .focus-why { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 8px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.06); }

  /* Deadline banner */
  .deadline-banner {
    background: rgba(239,68,68,0.06);
    border: 1px solid rgba(239,68,68,0.15);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .deadline-days { font-weight: 900; color: #ef4444; font-size: 28px; line-height: 1; min-width: 36px; text-align: center; }
  .deadline-info { flex: 1; }
  .deadline-name { font-size: 14px; font-weight: 700; }
  .deadline-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
  .deadline-urgent { animation: urgentPulse 1.5s infinite; }
  @keyframes urgentPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  /* Income */
  .income-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
  }
  .income-label { font-size: 12px; color: rgba(255,255,255,0.35); }
  .income-amount { font-size: 52px; font-weight: 900; background: linear-gradient(135deg, #00d4ff, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; margin: 4px 0; }
  .income-goal { font-size: 11px; color: rgba(255,255,255,0.2); }
  .income-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 4px; margin-top: 12px; overflow: hidden; }
  .income-bar-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #a855f7); border-radius: 4px; transition: width 0.6s ease; }

  /* Section */
  .section-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }

  /* Project cards */
  .project-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 10px;
    transition: transform 0.15s;
  }
  .project-card:active { transform: scale(0.98); }
  .project-top { display: flex; align-items: center; gap: 12px; }
  .project-icon {
    width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .project-info { flex: 1; min-width: 0; }
  .project-name { font-size: 15px; font-weight: 700; }
  .project-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .project-desc { font-size: 11px; color: rgba(255,255,255,0.3); }
  .owner-tag { font-size: 9px; color: rgba(168,85,247,0.7); background: rgba(168,85,247,0.1); padding: 1px 6px; border-radius: 4px; }
  .project-amount { font-size: 16px; font-weight: 800; flex-shrink: 0; }
  .project-status { font-size: 9px; padding: 2px 7px; border-radius: 5px; font-weight: 700; display: inline-block; }

  .status-active { background: rgba(16,185,129,0.15); color: #10b981; }
  .status-dev { background: rgba(0,212,255,0.15); color: #00d4ff; }
  .status-deadline { background: rgba(239,68,68,0.2); color: #ef4444; }
  .status-paused { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); }
  .status-hidden { background: rgba(16,185,129,0.06); color: rgba(16,185,129,0.4); }

  .project-card.hidden-project { border: 1px dashed rgba(16,185,129,0.12); }
  .project-card.hidden-project .project-name { letter-spacing: 2px; }

  /* Next step */
  .project-next {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid rgba(255,255,255,0.04);
    font-size: 12px;
  }
  .next-label { color: rgba(255,255,255,0.25); font-size: 10px; margin-bottom: 3px; }
  .next-text { color: rgba(255,255,255,0.7); font-weight: 500; }
  .blocker {
    margin-top: 6px;
    font-size: 11px;
    color: #f59e0b;
    display: flex;
    align-items: flex-start;
    gap: 4px;
  }
  .blocker::before { content: '⚠'; flex-shrink: 0; }

  /* Chart */
  .chart-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 16px;
    margin-top: 20px;
  }
  .chart-card canvas { width: 100% !important; height: 140px !important; }

  /* Streak */
  .streak-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    padding: 14px 16px;
    margin-top: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .streak-left { display: flex; align-items: center; gap: 8px; }
  .streak-fire { font-size: 20px; }
  .streak-label { font-size: 12px; color: rgba(255,255,255,0.4); }
  .streak-num { font-size: 24px; font-weight: 900; color: #f59e0b; }

  /* Footer */
  .updated { text-align: center; font-size: 10px; color: rgba(255,255,255,0.1); margin-top: 20px; }

  /* Animate in */
  .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
  @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(8px); } }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="logo">M</div>
      <h1>МОНОПОЛИЕ</h1>
    </div>
    <div class="header-right" id="headerDate">—</div>
  </div>

  <!-- Focus: THE ONE THING -->
  <div class="focus-card fade-in" id="focusCard" style="display:none">
    <div class="focus-label">🎯 Фокус</div>
    <div class="focus-question" id="focusQuestion"></div>
    <div class="focus-answer" id="focusAnswer"></div>
    <div class="focus-why" id="focusWhy"></div>
  </div>

  <!-- Deadline -->
  <div class="deadline-banner" id="deadlineBanner" style="display:none">
    <div class="deadline-days" id="deadlineDays">—</div>
    <div class="deadline-info">
      <div class="deadline-name" id="deadlineName">—</div>
      <div class="deadline-sub" id="deadlineText">—</div>
    </div>
  </div>

  <!-- Total income -->
  <div class="income-card fade-in" style="animation-delay:0.1s">
    <div class="income-label" id="incomeLabel">—</div>
    <div class="income-amount" id="incomeAmount">0 ₸</div>
    <div class="income-goal" id="incomeGoal"></div>
    <div class="income-bar"><div class="income-bar-fill" id="incomeBar" style="width:0%"></div></div>
  </div>

  <!-- Projects -->
  <div class="section-title">Проекты</div>
  <div id="projectsList"></div>

  <!-- Streak -->
  <div class="streak-card" id="streakCard" style="display:none">
    <div class="streak-left">
      <div class="streak-fire">🔥</div>
      <div class="streak-label">Дней подряд с прогрессом</div>
    </div>
    <div class="streak-num" id="streakNum">0</div>
  </div>

  <!-- Chart -->
  <div class="chart-card">
    <div class="section-title" style="margin-bottom:8px">Доход</div>
    <canvas id="revenueChart"></canvas>
  </div>

  <div class="updated" id="updatedTime">—</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script>
const API = './api/data.json';
let chartInstance = null;

const STATUS_MAP = {
  active: { label: 'Активен', cls: 'status-active' },
  dev: { label: 'В разработке', cls: 'status-dev' },
  deadline: { label: 'Горит', cls: 'status-deadline' },
  paused: { label: 'Пауза', cls: 'status-paused' },
  hidden: { label: '▪▪▪', cls: 'status-hidden' }
};

function fmt(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1).replace(/\.0$/, '') + 'K';
  return String(n);
}

function daysLeft(dateStr) {
  return Math.ceil((new Date(dateStr) - new Date()) / 86400000);
}

function pluralDays(n) {
  if (n <= 0) return 'Просрочено!';
  const last = n % 10, tens = n % 100;
  if (last === 1 && tens !== 11) return n + ' день';
  if (last >= 2 && last <= 4 && (tens < 12 || tens > 14)) return n + ' дня';
  return n + ' дней';
}

async function load() {
  try {
    const d = await (await fetch(API + '?t=' + Date.now())).json();
    render(d);
  } catch (e) {
    document.getElementById('incomeLabel').textContent = 'Нет связи';
  }
}

function render(d) {
  // Date
  const now = new Date();
  const dayNames = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
  document.getElementById('headerDate').innerHTML = dayNames[now.getDay()] + ', ' + now.toLocaleDateString('ru-RU', {day:'numeric', month:'short'});

  // Focus
  if (d.focus) {
    const fc = document.getElementById('focusCard');
    fc.style.display = 'block';
    document.getElementById('focusQuestion').textContent = d.focus.question;
    document.getElementById('focusAnswer').textContent = d.focus.answer;
    document.getElementById('focusWhy').textContent = d.focus.why;
  }

  // Deadlines
  const deadlines = d.projects.filter(p => p.deadline).sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
  if (deadlines.length) {
    const p = deadlines[0];
    const days = daysLeft(p.deadline);
    const banner = document.getElementById('deadlineBanner');
    banner.style.display = 'flex';
    if (days <= 1) banner.classList.add('deadline-urgent');
    document.getElementById('deadlineDays').textContent = days <= 0 ? '!' : days;
    document.getElementById('deadlineName').textContent = p.name;
    document.getElementById('deadlineText').textContent = days <= 0 ? 'Дедлайн прошёл!' : pluralDays(days) + ' до дедлайна';
  }

  // Income
  document.getElementById('incomeLabel').textContent = d.month;
  document.getElementById('incomeAmount').textContent = d.total.amount > 0 ? fmt(d.total.amount) + ' ₸' : '0 ₸';

  const goal = 1000000;
  const pct = Math.min((d.total.amount / goal) * 100, 100);
  document.getElementById('incomeGoal').textContent = d.total.amount > 0 ? fmt(d.total.amount) + ' / 1M ₸' : 'Цель: 1M ₸ / мес';
  document.getElementById('incomeBar').style.width = Math.max(pct, 0.5) + '%';

  // Projects
  const list = document.getElementById('projectsList');
  list.innerHTML = d.projects.map((p, i) => {
    const s = STATUS_MAP[p.status] || STATUS_MAP.active;
    const isHidden = p.status === 'hidden';
    const ownerHtml = p.owner ? `<span class="owner-tag">${p.owner}</span>` : '';

    let nextHtml = '';
    if (p.next && !isHidden) {
      nextHtml = `<div class="project-next">
        <div class="next-label">Следующий шаг</div>
        <div class="next-text">${p.next}</div>
        ${p.blocker ? `<div class="blocker">${p.blocker}</div>` : ''}
      </div>`;
    }

    return `
    <div class="project-card ${isHidden ? 'hidden-project' : ''} fade-in" style="animation-delay:${0.15 + i * 0.05}s">
      <div class="project-top">
        <div class="project-icon" style="background:${p.color}${isHidden ? '08' : '12'}">${p.icon}</div>
        <div class="project-info">
          <div class="project-name">${p.name}</div>
          <div class="project-meta">
            <span class="project-desc">${p.desc}</span>
            ${ownerHtml}
          </div>
        </div>
        <div class="project-amount" style="color:${p.color}">${p.amount > 0 ? fmt(p.amount) + ' ₸' : '0'}</div>
      </div>
      ${nextHtml}
    </div>`;
  }).join('');

  // Streak
  if (d.streak !== undefined) {
    document.getElementById('streakCard').style.display = 'flex';
    document.getElementById('streakNum').textContent = d.streak;
  }

  // Chart
  renderChart(d.months);

  // Updated
  document.getElementById('updatedTime').textContent = 'обновлено ' + new Date(d.updated).toLocaleString('ru-RU', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
}

function renderChart(months) {
  if (chartInstance) chartInstance.destroy();
  const ctx = document.getElementById('revenueChart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: months.map(m => m.month),
      datasets: [{
        data: months.map(m => m.amount),
        backgroundColor: months.map((_, i) => i === months.length - 1 ? '#00d4ff' : 'rgba(0,212,255,0.25)'),
        borderRadius: 6,
        barThickness: months.length === 1 ? 48 : undefined
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.25)', font: { size: 10 } } },
        y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: 'rgba(255,255,255,0.2)', font: { size: 10 }, callback: v => v >= 1000 ? fmt(v) : v }, beginAtZero: true }
      }
    }
  });
}

load();
setInterval(load, 5 * 60 * 1000);
</script>
</body>
</html>
